function buildTopicMindMap(topic, subject) {
    const n = topic.name.en;
    const colors = ["#48C78E", "#C084FC", "#60A5FA", "#F59E0B", "#EF4444"];
    // Subject-specific branch themes
    const themes = {
        history: [{ l: "Timeline", i: "📅" }, { l: "Key Rulers", i: "👑" }, { l: "Admin", i: "🏛️" }, { l: "Culture", i: "🎭" }, { l: "PYQ Focus", i: "🔴" }],
        geography: [{ l: "Location", i: "📍" }, { l: "Features", i: "⛰️" }, { l: "Climate", i: "🌦️" }, { l: "Economy", i: "💰" }, { l: "Facts", i: "📊" }],
        society: [{ l: "Structure", i: "👥" }, { l: "Issues", i: "⚠️" }, { l: "Laws", i: "⚖️" }, { l: "Welfare", i: "🤝" }, { l: "PYQ", i: "🔴" }],
        polity: [{ l: "Articles", i: "📜" }, { l: "Structure", i: "🏛️" }, { l: "Rights", i: "✊" }, { l: "Amendments", i: "✏️" }, { l: "PYQ", i: "🔴" }],
        economy: [{ l: "Overview", i: "📊" }, { l: "Sectors", i: "🏭" }, { l: "Schemes", i: "💰" }, { l: "Data", i: "📈" }, { l: "PYQ", i: "🔴" }],
        science: [{ l: "Concepts", i: "🔬" }, { l: "Missions", i: "🚀" }, { l: "Discoveries", i: "💡" }, { l: "Policy", i: "📋" }, { l: "PYQ", i: "🔴" }],
        mental: [{ l: "Types", i: "🧠" }, { l: "Approach", i: "✏️" }, { l: "Tricks", i: "💡" }, { l: "Practice", i: "📝" }, { l: "Shortcuts", i: "⚡" }],
        ap: [{ l: "History", i: "🏛️" }, { l: "Geography", i: "🗺️" }, { l: "Economy", i: "💰" }, { l: "Culture", i: "🎭" }, { l: "PYQ", i: "🔴" }],
    };
    const sid = subject.id;
    const th = themes[sid] || themes.history;
    return {
        root: n.length > 14 ? n.substring(0, 12) + "…" : n,
        branches: th.map((t, i) => ({
            label: t.l, icon: t.i, color: colors[i],
            children: ["Overview", "Key Facts", "PYQ Focus", "Quick Tip"]
        }))
    };
}
// ─── TOPIC DOC RESOLVER ──────────────────────────────────────
function resolveTopicDoc(topic, subject) {
    if (!topic)
        return IVC_DOC;
    if (topic.id === "ivc")
        return IVC_DOC;
    return TOPIC_CONTENT_MAP[topic.id] || buildTopicDoc(topic, subject);
}
function resolveTopicMindMap(topic, subject) {
    if (!topic)
        return IVC_MINDMAP;
    if (topic.id === "ivc")
        return IVC_MINDMAP;
    return buildTopicMindMap(topic, subject);
}
